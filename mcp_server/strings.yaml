tools:
  search_code: |
    Semantic code search — the primary entry point for finding code by meaning. Returns ranked results with file paths, line numbers, similarity scores, and code snippets. On indexed projects, use this proactively at the start of any task to orient yourself — it surfaces relevant code by meaning rather than exact keywords, for bug investigation, feature work, refactoring, and exploring unfamiliar areas.
    USE WHEN: Finding code by description, concept, or keyword (e.g. "authentication logic", "database connection pooling"). Use early in any task to build context before making changes — requires an indexed project (run index_directory first; auto-reindex keeps the index current).
    DO NOT USE WHEN: You already have a chunk_id and want structurally similar code (use find_similar_code) or deep relationship traversal (use get_graph_context).
    Key args:
      query (required): natural language description of code to find.
      k: number of results (1–100, default 5).
      file_pattern: glob filter (e.g. "*.py", "src/**/*.ts").
      chunk_type: filter by "function", "class", "method", etc.
      project_path: search a different indexed project without switching context.
    Example: search_code("retry logic with exponential backoff", k=10, file_pattern="*.py")
    Cross-project: search_code("auth middleware", project_path="/other/repo")

  index_directory: |
    Index a codebase for semantic search. Creates isolated per-project storage. Run before searching a new project.
    USE WHEN: A project has never been indexed, or you want to force a full re-index.
    DO NOT USE WHEN: The project is already indexed — search_code auto-refreshes stale indexes before each search.
    Key args:
      directory_path (required): absolute path to the project root.
      project_name, file_patterns: optional display name and glob includes (sensible defaults).
      incremental: False to force full re-index (default True).
    Example: index_directory("/home/user/my-project")

  find_similar_code: |
    Find code structurally or functionally similar to a known chunk. Returns ranked matches by embedding distance.
    USE WHEN: You have a chunk_id from search_code and want duplicates, alternative implementations, or refactoring candidates.
    DO NOT USE WHEN: You are starting a fresh search — use search_code instead. This tool requires a chunk_id, not a query string.
    Key args:
      chunk_id (required): identifier from a search_code result.
      k: number of similar chunks to return (default 5).
    Example: find_similar_code("src/auth.py::authenticate_user::0", k=10)

  get_index_status: |
    Get index health, sync status, and metadata for the active project.
    USE WHEN: You need to check whether a project is indexed, verify sync state (synced/degraded), or inspect storage metrics.
    Returns: chunk count, storage size, vector/graph/snapshot sync status, model info, and reranker state.

  list_projects: |
    List all indexed projects with paths and metadata.
    USE WHEN: Discovering available projects or finding a project_path for cross-project search.
    Example: list_projects()

  switch_project: |
    Switch the active project context. Subsequent search_code calls (without explicit project_path) target this project.
    USE WHEN: Making multiple searches against a different project.
    DO NOT USE WHEN: Single cross-project query — pass project_path to search_code instead.
    Key args:
      project_path (required): absolute path to an indexed project.
    Example: switch_project("/home/user/other-project")

  index_test_project: Index the built-in sample project to verify that search setup is working correctly.

  clear_index: |
    DESTRUCTIVE: Permanently deletes the active project's vector index, graph, and snapshot metadata. Cannot be undone — re-indexing required to restore search.
    USE WHEN: Index is corrupted or you need a clean slate.
    Returns: per-store outcomes (vector_cleared, graph_cleared, snapshot_cleared).

  get_graph_context: |
    Deep structural traversal around a code chunk. Returns containment (class→method) and inheritance (child→parent) relationships within max_depth hops.
    USE WHEN: You have a chunk_id from search_code and need to understand how it connects to surrounding code (parent class, sibling methods, inheritance chain).
    DO NOT USE WHEN: You want to find code by meaning — use search_code (which already includes lightweight graph hints).
    Key args:
      chunk_id (required): identifier from a search_code result.
      max_depth: traversal depth (default 2, keep small — 1–3 recommended).
      project_path: query a different project's graph without switching context.
    Returns found=true with symbols/edges, or found=false with miss_reason when chunk is absent from the graph.
    Example: get_graph_context(chunk_id="src/auth.py::AuthService::0", max_depth=2)

help: |
  # Code Search Tools — Quick Reference

  ## Tip: Use search_code proactively
  On indexed projects, run `search_code` early in any task to orient yourself — it surfaces relevant code by meaning, not just exact keywords. Useful for understanding unfamiliar areas, investigating bugs, or scoping changes before reading files.

  ## First-time setup
  1. `index_directory("/path/to/project")` — index a codebase
  2. `search_code("your query")` — search by meaning

  ## Search → Drill-down workflow
  1. `search_code("query")` — find relevant code
  2. `find_similar_code(chunk_id)` — find related chunks (needs chunk_id from step 1)
  3. `get_graph_context(chunk_id)` — explore structural relationships (optional)

  ## Multi-project
  - **One-off query**: `search_code("query", project_path="/other/repo")`
  - **Switch context**: `switch_project("/other/repo")` then `search_code("query")`
  - **Discover projects**: `list_projects()`

  ## Maintenance
  - `get_index_status()` — check index health and sync state
  - `clear_index()` — reset active project index (destructive)
  - `index_test_project()` — verify setup with sample data

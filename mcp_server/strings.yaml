tools:
  search_code: |
    Search code by natural language query using semantic similarity. Returns ranked results with file paths, line numbers, similarity scores, and code snippets. Use for understanding functionality, finding patterns, or discovering related code.
    Minimal usage: search_code("authentication")
    Full usage: search_code("authentication", k=10, file_pattern="*.py")
    Cross-project: search_code("auth", project_path="/other/project") — searches another indexed project without changing active context.

  index_directory: |
    Index a codebase using semantic embeddings. Each project gets isolated storage under ~/.claude_code_search/projects/. Multiple projects can be indexed independently.
    Minimal usage: index_directory("/path/to/project")
    Full usage: index_directory("/path/to/project", project_name="project", file_pattern="*.py", incremental=False)

  find_similar_code: |
    Find code chunks functionally similar to a reference chunk. Useful for finding alternative implementations, code duplication, or refactoring related code.
    Usage: find_similar_code(chunk_id from search_code, k=5)

  get_index_status: Get current index statistics and model status for the active project.

  list_projects: |
    List all indexed projects with their paths and metadata.
    Multi-project workflow: list_projects() → switch_project("/path") → search_code("query")
    Or query without switching: search_code("query", project_path="/path")

  switch_project: |
    Switch active project. All subsequent search_code calls (without project_path) will target this project.
    Usage: switch_project("/path/to/project")
    Tip: Use list_projects() to see available projects and their paths.

  index_test_project: Index built-in sample project to test the search setup.

  clear_index: Clear the search index, relational graph, and metadata for the current active project.

  get_graph_context: |
    Retrieve structural relationships around a code chunk. Shows callers, callees, parent classes, and other connections from the relational graph built during indexing.
    Usage: get_graph_context(chunk_id="abc123", max_depth=2)
    Cross-project: get_graph_context(chunk_id="abc123", project_path="/other/project")

help: |
  # Multi-project code search

  Each project is independently indexed and isolated.

  ## Workflow options

  ### Option A: Switch active project
  1. `list_projects()` — see all indexed projects
  2. `switch_project("/path/to/project")` — make it active
  3. `search_code("query")` — searches active project

  ### Option B: Cross-project search (no context switch)
  `search_code("query", project_path="/path/to/other/project")`

  ## Basic workflow
  1. Index: `index_directory("/path/to/project")`
  2. Search: `search_code("description of code")`
  3. Find similar: `find_similar_code(chunk_id from search_code)`
  4. Graph context: `get_graph_context(chunk_id)` — see relationships

  See tool descriptions for all available options.

[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    mcp: MCP server related tests
    embeddings: Embedding generation tests
    chunking: Code chunking tests
    search: Search functionality tests
    lancedb: LanceDB vector storage tests
    unsloth: Unsloth/Qwen3 embedding model tests
    gpu: Tests that need GPU hardware to be meaningful (informational marker — no auto-skip; add skipif guards in individual tests when needed)
    packaging: Clean-environment packaging smoke tests (build wheel, install, verify entry points)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore:.*unclosed.*:ResourceWarning